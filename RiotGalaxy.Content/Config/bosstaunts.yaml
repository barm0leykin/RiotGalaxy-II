# Реплики боссов (злобные, но с юмором). Ключ — id миссии (один босс на миссию).
# intro — при появлении; phase2/phase3 — при переходе фаз (66%/33% HP); defeat — при гибели.
# Показываются в MessageLog, бой не прерывают. Боссы с фазами: m1–m5 и m9.

m1:
  name: "ХмельМаш"
  intro: "Пиво кончилось. И ты — почти."
  phase2: "Бурю тебя, как скважину!"
  phase3: "ПЕННАЯ ЯРОСТЬ!!!"
  defeat: "Всё… ушло… в осадок…"

m2:
  name: "Брандспойт-9000"
  intro: "Тут пожар. Источник — ты."
  phase2: "Пеной в лицо — строго по инструкции!"
  phase3: "ДАВЛЕНИЕ В НОРМЕ. ТВОЁ — НЕТ."
  defeat: "Отбой… течь в корпусе…"

m3:
  name: "Доктор Хаус"
  intro: "Диагноз: залётный. Лечение — радикальное."
  phase2: "Не больно. Просто смертельно."
  phase3: "КОД СИНИЙ! И код — ТВОЙ."
  defeat: "Само… не прошло…"

m4:
  name: "Контролёр"
  intro: "Проход платный. Валюта — жизнь."
  phase2: "Скидок нет. Пощады — тоже."
  phase3: "НЕОПЛАЧЕННЫЙ ВЫХОД!!!"
  defeat: "Касса… закрыта…"

m5:
  name: "Зональный"
  intro: "Ты портишь мне отдых, пилот."
  phase2: "У меня адвокаты злее любой пушки!"
  phase3: "ЭТО МОЯ ГАЛАКТИКА!!!"
  defeat: "Мне… платили… я не один такой…"

m9:
  name: "Командир"
  intro: "За зависть! За… а, неважно! В АТАКУ!"
  phase2: "Вы жировали — теперь горите!"
  phase3: "НАС МНОГО! Я один… но очень злой!"
  defeat: "Нам… обещали…"
