# Параметры врагов по типам.
# Поля: hp, damage, shootInterval (сек между выстрелами; 0 — не стреляет).
# Скорость и интервал стрельбы можно задать диапазоном для рандома:
#   speed: 130                 — фиксированная
#   speedMin/speedMax: 100/150 — случайная в диапазоне
# (то же для shootInterval / shootIntervalMin / shootIntervalMax)
#
# attackSpeed — скорость во время вылета/атаки из улья (0/нет — берётся обычная speed).
#   Все тактики (в т.ч. ellipse/snake) привязаны к этой скорости — линейная скорость ≈ attackSpeed.
#
# tactics — список тактик пике при вылете из улья (sortie). При каждом вылете
# выбирается случайная из списка. Возможные значения:
#   random    — прямо вниз с уклоном и отскоком от боков
#   snake     — змейкой (синус по X)
#   ram       — таран: прямо в точку, где был игрок на момент вылета
#   ellipse   — петля/дуга (Galaga-стиль)
#   zigzag    — резкий зигзаг (треугольная волна)
#   spiral    — расширяющийся штопор
#   swoop     — дайв-бомба: разгон вниз с боковым замахом
#   strafe    — спуск → проход поперёк экрана → снова вниз
#   homing    — самонаведение: доворачивает на игрока
#   boomerang — ныряет и возвращается вверх
#
# Внешний вид и поведение (раньше задавались классами-наследниками, теперь — данными):
#   sprite           — ассет спрайта (Images/...)
#   scale            — масштаб спрайта и хитбокса (1 — обычный; босс крупнее)
#   shoot            — стрельба: none / down (вниз) / aim (прицельно в игрока)
#   ai               — машина состояний: none / blue / red (иначе — движение с отскоком)
#   wander           — периодически менять курс/скорость (как зелёный)
#   dirMin / dirMax  — диапазон стартового курса при движении с отскоком (градусы; 180 — строго вниз)

scout:
  hp: 10
  damage: 5
  speedMin: 60
  speedMax: 100
  shootInterval: 0      # разведчик не стреляет
  tactics: [random]
  sprite: Images/Enemies/thin_green_1
  shoot: none
  dirMin: 155
  dirMax: 205
  reward: 10             # кредиты за убийство

blue:
  hp: 10
  damage: 10
  speed: 130
  attackSpeed: 200
  shootInterval: 4
  tactics: [snake, ram, zigzag]
  sprite: Images/Enemies/thin_blue_1
  ai: blue
  shoot: down
  reward: 15

green:
  hp: 10
  damage: 10
  speedMin: 100
  speedMax: 150
  attackSpeed: 200
  shootInterval: 4
  tactics: [random, snake, swoop]
  sprite: Images/Enemies/fat_green_1
  shoot: down
  wander: true
  dirMin: 135
  dirMax: 225
  reward: 15

red:
  hp: 20
  damage: 10
  speed: 60
  attackSpeed: 160
  shootInterval: 6
  tactics: [ram, ellipse, boomerang]
  sprite: Images/Enemies/fat_red_1
  ai: red
  shoot: aim
  reward: 25

boss:
  hp: 200
  damage: 20
  speed: 50
  shootInterval: 1.2
  tactics: []
  sprite: Images/Enemies/fat_purple_1   # крупный «толстый» фиолетовый — отличает босса визуально
  scale: 2.5
  ai: boss            # фазы по HP + телеграф атак (BossAI); движение/огонь ведёт сам
  shoot: aim
  dirMin: 135
  dirMax: 135
  reward: 120

# ── Акт II: укропитеки (оранжевые) и Космерика-тяжёлые ───────────────────────
# ukro — рядовой укропитек (стреляет вниз, блуждает); kamik — камикадзе (несётся вниз, таранит,
# не стреляет); heavy — тяжёлый с оружием Косморики (живучий, прицельный, ИИ red); ukroboss —
# полевой командир (финал Акта II).
ukro:
  hp: 12
  damage: 10
  speedMin: 90
  speedMax: 140
  attackSpeed: 210
  shootInterval: 3.5
  tactics: [random, snake, spiral]
  sprite: Images/Enemies/fat_orange_1
  shoot: down
  wander: true
  dirMin: 140
  dirMax: 220
  reward: 18

kamik:
  hp: 8
  damage: 18
  speedMin: 180
  speedMax: 230
  attackSpeed: 320
  shootInterval: 0
  tactics: [ram, homing]
  sprite: Images/Enemies/thin_yellow_1
  shoot: none
  dirMin: 170
  dirMax: 190
  reward: 14

heavy:
  hp: 40
  damage: 12
  speed: 55
  attackSpeed: 150
  shootInterval: 2.5
  tactics: [ram, ellipse, strafe]
  sprite: Images/Enemies/fat_orange_2
  scale: 1.2
  ai: red
  shoot: aim
  reward: 35

ukroboss:
  hp: 320
  damage: 22
  speed: 45
  shootInterval: 1.0
  tactics: []
  sprite: Images/Enemies/fat_orange_6
  scale: 2.6
  ai: boss            # фазовый босс (BossAI)
  shoot: aim
  dirMin: 135
  dirMax: 135
  reward: 200
