# Основные настройки игры (перенесено из оригинального options.ini).
screen:
  width: 1280
  height: 768

player:
  name: "Nuke SkyRocker"
  maxHp: 50
  maxSpeed: 450
  acceleration: 1500
  brakeSpeed: 800
  invulnTime: 2.0     # секунды неуязвимости после попадания

combat:
  # Макс. отклонение прицельного выстрела врага (shoot: aim) от вертикали-вниз, градусы.
  # Меньше — враги стреляют «прямее вниз», легче уклоняться; 90 сняло бы ограничение почти совсем.
  aimMaxDeg: 55
