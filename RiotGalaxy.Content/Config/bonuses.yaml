# Параметры бонусов.
hpUpAmount: 25     # сколько HP восстанавливает BonusHpUp (с учётом ограничения по MaxHp)
starCredits: 10    # кредиты за звезду-фолбэк (обычно звезда несёт номинал убитого врага, enemy.reward)

# Временные баффы-подборы (действуют ограниченное время, повторный подбор продлевает).
# mult — множитель эффекта; duration — длительность, сек.
buffs:
  power: { mult: 2.0, duration: 10 }   # ×2 урон
  rapid: { mult: 1.6, duration: 10 }   # быстрее стрельба
  speed: { mult: 1.4, duration: 10 }   # быстрее корабль

# Шанс (%) выпадения временного баффа из убитого врага (распределяется поровну между баффами).
buffDropChance: 12

# Бонус-кредиты за прохождение уровня: base + perLevel * номер_уровня (поощряет доходить до конца).
levelClearBonusBase: 25
levelClearBonusPerLevel: 15

# Дробление награды на звёзды: число звёзд = reward / starValue (тяжёлые враги сыплют больше).
starValue: 10
maxStarsPerKill: 30

# Сколько секунд после зачистки уровня дать на сбор оставшихся звёзд перед переходом.
levelClearCollectSeconds: 2.5
