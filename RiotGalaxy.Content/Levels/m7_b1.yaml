# Корован — перехват. Укропитеки заходят по маршрутам, прикрыты тяжёлыми.
# spawnInterval пошире, чтобы враги на одной линии-маршруте шли с зазором (не нос-в-хвост).
description: "Корован — перехват"
spawnInterval: 0.65
events:
  - { enemy: ukro, count: 4, route: zmeyka1-left, after: scatter }
  - { enemy: ukro, count: 4, route: zmeyka1-right, after: scatter }
  - { wait: 1 }
  - { enemy: heavy, count: 2 }
