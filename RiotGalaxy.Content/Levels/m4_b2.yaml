# Пятёрочка — склад. Одновременные заходы с двух сторон (parallel) + формация прикрытия.
description: "Пятёрочка — склад"
spawnInterval: 0.4
events:
  - parallel:
      - - { enemy: blue, count: 5, route: zmeyka1-left, after: scatter }
      - - { enemy: blue, count: 5, route: zmeyka1-right, after: scatter }
  - { wait: 1 }
  - { enemy: green, count: 6, formation: true }
