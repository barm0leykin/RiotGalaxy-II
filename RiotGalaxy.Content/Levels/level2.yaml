# Уровень 2 «Recon Snakes» — знакомство с маршрутами и ульем.
# Сначала разведчики заходят змейкой с двух сторон (parallel) и разлетаются,
# затем формируется улей синих с редкими вылетами (sortie).
description: "Recon Snakes"
spawnInterval: 0.8
sortie: true
sortieInterval: 4      # вылеты редкие — мягкое знакомство
sortieCount: 1
events:
  - parallel:
      - - { enemy: scout, count: 3, route: zmeyka1-left, after: scatter }
      - - { enemy: scout, count: 3, route: zmeyka1-right, after: scatter }
  - { wait: 1.5 }
  - { enemy: blue, count: 8, formation: true }   # улей 8 — пикируют snake/ram
