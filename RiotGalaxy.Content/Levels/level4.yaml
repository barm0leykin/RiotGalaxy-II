# Уровень 4 «Crossfire» — заходы с двух сторон + улей красных (опасные ellipse/ram-вылеты).
# Вылеты участились и идут по двое (sortieCount: 2).
description: "Crossfire"
spawnInterval: 0.35
sortie: true
sortieInterval: 2.5
sortieCount: 2
events:
  - parallel:
      - - { enemy: green, count: 4, route: zmeyka1-left, after: scatter }
      - - { enemy: green, count: 4, route: zmeyka1-right, after: scatter }
  - { wait: 1 }
  - { enemy: red, count: 6, formation: true }    # красные в улье — пикируют петлёй/тараном
  - { enemy: blue, count: 6, formation: true }
