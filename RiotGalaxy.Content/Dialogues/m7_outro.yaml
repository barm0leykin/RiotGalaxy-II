# Итог миссии 7: корованы Косморики разбиты; но зависть придумал не Trapp.
lines:
  - { speaker: "Люк", text: "Корован разбит. Ящики — с логотипом Косморики.", portrait: "Images/portrait_luke" }
  - { speaker: "Рейдер", text: "Значит, Trapp кормит резню оружием. Но зависть придумал не он — он слишком прост.", portrait: "Images/portrait_raider" }
  - { speaker: "Кардиган", text: "Я бы сказал «туп», но я же дипломат!", portrait: "Images/portrait_kardigan" }
