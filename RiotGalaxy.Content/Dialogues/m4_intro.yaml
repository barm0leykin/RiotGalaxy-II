# Брифинг перед миссией 4 «Пятёрочка-Орбитальная» (ЧОП-охрана).
lines:
  - { speaker: "Рейдер", text: "Прежде чем добраться до наместника — его «безопасность». Гипермаркет «Пятёрочка-Орбитальная».", portrait: "Images/portrait_raider" }
  - { speaker: "Люк", text: "Охрана супермаркета? Серьёзно?", portrait: "Images/portrait_luke" }
  - { speaker: "Рейдер", text: "Контракт на охрану Зональный отдал своей фирме. Старый ЧОП — за бортом и в бешенстве.", portrait: "Images/portrait_raider" }
  - { speaker: "Люк", text: "То есть я воюю с обиженными вахтёрами. Новый низ карьеры.", portrait: "Images/portrait_luke" }
