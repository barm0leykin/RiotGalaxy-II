# Финал Акта I: Зональный повержен, но сдаёт хозяев — космериканцев. Мост в Акт II.
lines:
  - { speaker: "Зональный", text: "Думаешь, это я придумал?! Мне ПЛАТИЛИ! Космериканцы! Спроси у них, кто…", portrait: "Images/portrait_zonalny" }
  - { speaker: "Рейдер", text: "Связь оборвалась. Но мы услышали достаточно. Один кошелёк закрыт.", portrait: "Images/portrait_raider" }
  - { speaker: "Кардиган", text: "Блестящая кампания! Орден «За мудрое руководство» получает… Агдам ДоДыров!", portrait: "Images/portrait_kardigan" }
  - { speaker: "Агдам", text: "Я руководил. Дистанционно. С пляжа. Это было непросто.", portrait: "Images/portrait_agdam" }
  - { speaker: "Люк", text: "Бунты были разминкой, да? Чувствую, домой к Ниблеру я не скоро.", portrait: "Images/portrait_luke" }
  - { speaker: "Рейдер", text: "Не скоро, пилот. Космериканцы только начали. Готовься к настоящей войне.", portrait: "Images/portrait_raider" }
