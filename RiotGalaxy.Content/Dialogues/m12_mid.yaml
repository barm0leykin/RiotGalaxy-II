# Середина миссии 12: за бризанцами — торговцы J-D-bI, скупающие разорённые миры.
lines:
  - { speaker: "Рейдер", text: "Смотри: за бризанцами — торговцы. Скупают разорённые миры за бесценок.", portrait: "Images/portrait_raider" }
  - { speaker: "Люк", text: "J-D-bI… Значит, всю войну кто-то просто зарабатывал?", portrait: "Images/portrait_luke" }
  - { speaker: "Рейдер", text: "Всегда кто-то зарабатывает, пилот. «Жнец» — их инструмент. Сломай его.", portrait: "Images/portrait_raider" }
