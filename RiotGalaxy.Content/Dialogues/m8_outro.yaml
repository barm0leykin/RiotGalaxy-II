# Итог миссии 8: кукловоды ушли в тень; геноцид держится на полевом командире.
lines:
  - { speaker: "Рейдер", text: "Кукловоды свернули сигнал и ушли в тень. Геноцид теперь держится на одном человеке.", portrait: "Images/portrait_raider" }
  - { speaker: "Люк", text: "На полевом командире.", portrait: "Images/portrait_luke" }
  - { speaker: "Рейдер", text: "Сними его — и резня захлебнётся. Это последний рубеж системы.", portrait: "Images/portrait_raider" }
