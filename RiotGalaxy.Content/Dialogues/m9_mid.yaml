# Перед боссом: полевой командир укропитеков (без портрета — рядовой фанатик).
lines:
  - { speaker: "Командир укропитеков", text: "Вы жируете, пока мы голодаем! Сегодня мы заберём ваше!" }
  - { speaker: "Люк", text: "Вам не «ваше» обещали. Вам обещали чужое — и чужими руками.", portrait: "Images/portrait_luke" }
  - { speaker: "Командир укропитеков", text: "Ложь имперца! В атаку!" }
  - { speaker: "Люк", text: "Ну хоть честно тупой. Поехали.", portrait: "Images/portrait_luke" }
