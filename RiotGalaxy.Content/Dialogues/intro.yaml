# Тон — лёгкая ирония в духе Radiant (Hexage). Тексты позже вынесем в локализацию.
lines:
  - { speaker: "Командир", text: "Пилот, рой Кси прорвал блокаду у Пояса. Между ними и колонией — только ты." }
  - { speaker: "Ник «Сорвиголова»", text: "То есть как обычно. Дайте только разогреть пушки." }
  - { speaker: "ИИ «Искра»", text: "Системы в норме. Вероятность выживания округлю до оптимистичной — так приятнее." }
  - { speaker: "Командир", text: "Вперёд. И постарайся вернуться в одном экземпляре." }
