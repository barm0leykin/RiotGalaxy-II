# Итог миссии 4: путь к яхте наместника открыт. Агдам — как всегда.
lines:
  - { speaker: "Ст. смены Захар", text: "Без скидки сотрудника я не работаю! И пакет теперь платный!", portrait: "Images/portrait_zahar" }
  - { speaker: "Люк", text: "Ты держал галактику в заложниках из-за пяти процентов и пакета.", portrait: "Images/portrait_luke" }
  - { speaker: "Агдам", text: "Я бы их раскидал, но берёг силы для пресс-конференции..", portrait: "Images/portrait_agdam" }
  - { speaker: "Агдам", text: "На самом деле я их уже почти победил пока вас не было, вам осталось только закончить. Победа за мной!", portrait: "Images/portrait_agdam" }
  - { speaker: "Рейдер", text: "Периметр взломан. Дорога к яхте наместника свободна. Финал близко, пилот.", portrait: "Images/portrait_raider" }
